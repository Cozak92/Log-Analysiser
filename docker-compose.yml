services:
  log-analysis-api:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      LOG_ANALYZER_MODE: auto
      LOG_ANALYZER_PROVIDER: mock
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: log_analysis_mvp
      OBSERVABILITY_POLL_ENABLED: "true"
      OBSERVABILITY_POLL_INTERVAL_SECONDS: "10"
    depends_on:
      - mongodb
    volumes:
      - .:/workspace
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db

volumes:
  mongodb-data:
